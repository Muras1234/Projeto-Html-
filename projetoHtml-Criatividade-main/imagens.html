<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imagem</title>
    <style>
        p{
            position: absolute;
            display: none;
        }
        .circular{
            width: 513px;
            background-color: #444;
        }
        .texto{
            width: 400px;
        }
        .texto img{
            margin-right: 10px;
        }
        .cidade{
            width: 513px;
            height: 342px;
            background-image: url('http://files.cod3r.com.br/curso-web/imagem4.jpg');
            background-position: center;
            background-repeat: no-repeat;
            background-size: 200%;
        }

    </style>
</head>
<body>
    <div wm-slider>
        <p>
            <img
                src="http://files.cod3r.com.br/curso-web/imagem1.jpg"
                alt="Muro da Cidade"
                width="513" height="342"
                title="Muro da Cidade por Tarso Bessa"
        </p>
        <p>
            <img
                src="http://files.cod3r.com.br/curso-web/imagem2.gif"
                alt="intro cod3er"
                height="342"
        </p>
        
    </p>
    <p class="texto">
        <img
         src="./profile.png"
        alt="Avtar"
        height="50"
        align="left"
    >

    </p>
    <p class="circular">
        <img
        src="http://files.cod3er.com.br/curso-web/imagem3.png"
        alt="Pão de açucar Rio de Janeiro"
        height="342"
    </p>
    <p class="Cidade"></p>p>

    </div>
    <script>
        function mover(elem, fim, passo, callback){
            const novoInicio = inicio - passo;
            if(novoInicio >= fim){
                elem.style.left = novoInicio + 'px'
                setTimeout(() => mover(elem,novoInicio, fim, passo, callback), 7)
            }else{
                callback()
            }
        }
        function slider(){
            const elementos = document.querySelectorAll('[wm slider]>p')

            function slide(){
                const elementos = document.querySelectorALL('[wm-slider]>p')
                const slides = Array.from(elementos)
                exibirSlide(slides, slides[0])
            }
        }
        function exibirSlide(slides, slides){
            slide.style.display = 'block'

            const inicio = innerWidth
            const fim = - slide.clientWidth
            slide .style.left = '${inicio}px'
            mover(slide, inicio, fim, 5, () =>{
                slide.style.display = 'none'
                exibirSlide(slide, getProximo(slide, slide))
            })
        }
        function getProximo(lista, atual){
            const i = lista.index0f(atual)+1
            return i < lista.length ? lista[i] : lista [0]
        }
        slider()
    </script>

</body>
</html>
